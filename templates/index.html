<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CAPTCHA Reader — AI Powered</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #00ffcc;
      --accent2: #7b61ff;
      --text: #e8e8f0;
      --muted: #666680;
      --error: #ff4466;
      --success: #00ffcc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123,97,255,0.12) 0%, transparent 70%);
      top: -200px; right: -200px;
      pointer-events: none;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite;
    }
    .glow-orb2 {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,204,0.08) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      pointer-events: none;
      z-index: 0;
      animation: pulse 8s ease-in-out infinite reverse;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.8s ease both;
    }

    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      border: 1px solid rgba(0,255,204,0.3);
      padding: 0.3rem 0.9rem;
      border-radius: 2px;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.8rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      font-family: 'Space Mono', monospace;
    }

    /* Upload Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      animation: fadeUp 0.8s ease 0.2s both;
    }

    /* Drop Zone */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(0,255,204,0.04);
    }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      width: 48px; height: 48px;
      margin: 0 auto 1rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      transition: all 0.25s;
    }

    .dropzone:hover .upload-icon {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0,255,204,0.2);
    }

    .dropzone p {
      font-size: 0.9rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .dropzone strong {
      color: var(--accent);
      font-family: 'Space Mono', monospace;
    }

    /* Preview */
    .preview-area {
      display: none;
      margin-top: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #0d0d14;
    }

    .preview-area.show { display: block; }

    .preview-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .preview-area img {
      display: block;
      width: 100%;
      max-height: 100px;
      object-fit: contain;
      padding: 1rem;
    }

    /* Button */
    .btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.9rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: #00e6b8;
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(0,255,204,0.3);
    }

    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    .result-box {
      display: none;
      margin-top: 1.5rem;
      border-radius: 12px;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }

    .result-box.show { display: block; }

    .result-box.success {
      border: 1px solid rgba(0,255,204,0.3);
      background: rgba(0,255,204,0.05);
    }

    .result-box.error {
      border: 1px solid rgba(255,68,102,0.3);
      background: rgba(255,68,102,0.05);
    }

    .result-header {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .result-box.success .result-header { color: var(--accent); }
    .result-box.error .result-header { color: var(--error); }

    .result-content {
      padding: 1.2rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .result-text {
      font-family: 'Space Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--accent);
    }

    .result-error-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--error);
    }

    .copy-btn {
      margin-left: auto;
      background: rgba(0,255,204,0.1);
      border: 1px solid rgba(0,255,204,0.2);
      color: var(--accent);
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: rgba(0,255,204,0.2);
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .stat {
      flex: 1;
      text-align: center;
    }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-top: 0.2rem;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      animation: fadeUp 0.8s ease 0.4s both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>
  <div class="glow-orb2"></div>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="badge">⚡ Deep Learning · CNN Model</div>
      <h1>CAPTCHA<br>Reader AI</h1>
      <p class="subtitle">Upload an image → get the text instantly</p>
    </div>

    <!-- Main Card -->
    <div class="card">

      <!-- Drop Zone -->
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept="image/*" />
        <div class="upload-icon">📎</div>
        <p><strong>Click to upload</strong> or drag & drop</p>
        <p style="margin-top:0.4rem; font-size:0.75rem;">PNG, JPG, JPEG supported</p>
      </div>

      <!-- Image Preview -->
      <div class="preview-area" id="previewArea">
        <div class="preview-label">📷 Uploaded Image</div>
        <img id="previewImg" src="" alt="preview" />
      </div>

      <!-- Predict Button -->
      <button class="btn" id="predictBtn" onclick="predict()" disabled>
        <span class="btn-text">🔍 &nbsp; Read CAPTCHA</span>
        <div class="spinner"></div>
      </button>

      <!-- Result -->
      <div class="result-box" id="resultBox">
        <div class="result-header" id="resultHeader"></div>
        <div class="result-content" id="resultContent"></div>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="statCount">0</div>
          <div class="stat-label">Predictions</div>
        </div>
        <div class="stat">
          <div class="stat-value">CNN</div>
          <div class="stat-label">Model Type</div>
        </div>
        <div class="stat">
          <div class="stat-value">6</div>
          <div class="stat-label">Char Length</div>
        </div>
      </div>

    </div>

    <div class="footer">Built with TensorFlow + Flask &nbsp;·&nbsp; CAPTCHA Recognition System</div>
  </div>

  <script>
    let selectedFile = null;
    let predictionCount = 0;

    const fileInput   = document.getElementById('fileInput');
    const dropzone    = document.getElementById('dropzone');
    const previewArea = document.getElementById('previewArea');
    const previewImg  = document.getElementById('previewImg');
    const predictBtn  = document.getElementById('predictBtn');
    const resultBox   = document.getElementById('resultBox');
    const statCount   = document.getElementById('statCount');

    // File selected via click
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    // Drag & Drop
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewArea.classList.add('show');
        predictBtn.disabled = false;
        resultBox.classList.remove('show');
      };
      reader.readAsDataURL(file);
    }

    async function predict() {
      if (!selectedFile) return;

      // Show loading
      predictBtn.classList.add('loading');
      predictBtn.disabled = true;
      resultBox.classList.remove('show');

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const response = await fetch('/predict', { method: 'POST', body: formData });
        const data = await response.json();

        if (data.success) {
          predictionCount++;
          statCount.textContent = predictionCount;
          showResult('success', data.prediction);
        } else {
          showResult('error', null, data.error || 'Something went wrong');
        }
      } catch (err) {
        showResult('error', null, 'Could not connect to server');
      }

      predictBtn.classList.remove('loading');
      predictBtn.disabled = false;
    }

    function showResult(type, prediction, errorMsg) {
      const header  = document.getElementById('resultHeader');
      const content = document.getElementById('resultContent');

      resultBox.className = `result-box show ${type}`;

      if (type === 'success') {
        header.textContent = '✅ Prediction Result';
        content.innerHTML = `
          <div class="result-text">${prediction}</div>
          <button class="copy-btn" onclick="copyText('${prediction}')">Copy</button>
        `;
      } else {
        header.textContent = '❌ Error';
        content.innerHTML = `<div class="result-error-text">${errorMsg}</div>`;
      }
    }

    function copyText(text) {
      navigator.clipboard.writeText(text);
      event.target.textContent = 'Copied!';
      setTimeout(() => event.target.textContent = 'Copy', 1500);
    }
  </script>
</body>
</html>
